services:
  # --- Backend API ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stroikontrol-api
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://stroikontrol:stroikontrol@postgres:5432/stroikontrol
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - SECRET_KEY=dev-secret-key-change-in-production
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
      - model-cache:/app/models
    depends_on:
      - postgres
      - redis
      - minio
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --- Human Review Dashboard ---
  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stroikontrol-dashboard
    ports:
      - "3001:80"
    depends_on:
      - api

  # --- PostgreSQL ---
  postgres:
    image: postgres:15-alpine
    container_name: stroikontrol-postgres
    environment:
      - POSTGRES_USER=stroikontrol
      - POSTGRES_PASSWORD=stroikontrol
      - POSTGRES_DB=stroikontrol
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: stroikontrol-redis
    ports:
      - "6379:6379"

  # --- MinIO (S3-compatible storage) ---
  minio:
    image: minio/minio:latest
    container_name: stroikontrol-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # --- Nginx (API Gateway) ---
  nginx:
    image: nginx:alpine
    container_name: stroikontrol-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres-data:
  minio-data:
  model-cache:
